<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual Gifts Inventory Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #000000; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1a1a1a; --border: #e2e8f0; }
        
        body { font-family: 'Times New Roman', serif; background-color: var(--bg); color: var(--text); line-height: 1.5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 50px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .no-print { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 8px; }
        .btn { font-family: sans-serif; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; border: 1px solid var(--border); background: white; }
        .btn-primary { background: var(--accent); color: white; border: none; width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 20px; }
        
        header { margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        
        .question-row { font-family: sans-serif; display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .question-row:hover { background-color: #f1f5f9; }
        .question-row.selected { background-color: #eff6ff; font-weight: bold; }
        
        /* REPORT STYLING - Paragraph Form */
        #report-output { display: none; }
        .report-section { margin-top: 30px; }
        .gift-entry { margin-bottom: 25px; text-align: justify; }
        .gift-title { font-weight: bold; text-transform: uppercase; }
        .selected-statement { margin-left: 20px; font-style: italic; color: #444; display: block; margin-top: 5px; }
        .section-header { font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #000; margin: 40px 0 20px 0; padding-bottom: 5px; }

        @media print {
            .no-print, .btn-primary, .video-section, #form-view, .instructions { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; padding: 0; }
            #report-output { display: block !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <button class="btn" id="lang-toggle" onclick="toggleLanguage()">🇵🇭 Tagalog</button>
</div>

<div class="container" id="printable-doc">
    <header>
        <h1 id="main-title">My Spiritual Gifts</h1>
    </header>

    <div id="form-view">
        <p id="sub-title" class="instructions">A method to help you discover your gifts. Check the items which best describe you.</p>
        <div id="questions-list"></div>
        <button class="btn btn-primary" id="btn-discover" onclick="generateDocument()">Generate My Report</button>
    </div>

    <div id="report-output">
        <div id="identified-gifts-container"></div>
        
        <div class="section-header" id="title-appendix">Full Category Descriptions</div>
        <div id="appendix-container"></div>
    </div>
</div>

<script>
    let currentLang = 'en';

    const uiText = {
        en: { title: "My Spiritual Gifts", sub: "A method to help you discover your gifts. Check the items which best describe you.", appendix: "Full Category Descriptions", pdf: "Download PDF", score: "Score" },
        tl: { title: "Aking mga Espirituwal na Kaloob", sub: "Isang pamamaraan upang matulungan kang matuklasan ang iyong mga kaloob. Lagyan ng tsek ang mga aytem na pinakamahusay na naglalarawan sa iyo.", appendix: "Buong Deskripsyon ng mga Kategorya", pdf: "I-download ang PDF", score: "Iskor" }
    };

    const questions = [
        { id: 1, cat: "G", en: "I prefer ministering by myself rather than in a group.", tl: "Mas gusto kong maglingkod nang mag-isa kaysa sa isang grupo." },
        { id: 2, cat: "F", en: "People often say I am impulsive and direct.", tl: "Madalas sabihin ng mga tao na ako ay pabigla-bigla at prangka." },
        { id: 3, cat: "A", en: "My financial resources are above average.", tl: "Ang aking pinansyal na mapagkukunan ay higit sa karaniwan." },
        { id: 4, cat: "D", en: "I like to counsel people on a short-term basis.", tl: "Gusto kong magpayo sa mga tao sa maikling panahon." },
        { id: 5, cat: "G", en: "I am a task-oriented person.", tl: "Ako ay isang taong nakatuon sa gawain." },
        { id: 6, cat: "B", en: "I love directing other people's work.", tl: "Mahal ko ang pagdidirekta sa trabaho ng ibang tao." },
        { id: 7, cat: "E", en: "It's natural for me to show kindness to people.", tl: "Likas sa akin ang magpakita ng kabaitan sa mga tao." },
        { id: 8, cat: "C", en: "People learn easily from me.", tl: "Madaling matuto ang mga tao mula sa akin." },
        { id: 9, cat: "F", en: "I can be very persuasive.", tl: "Maaari akong maging napaka-mapanghikayat." },
        { id: 10, cat: "A", en: "More than 10 percent of my income goes for Christian causes.", tl: "Higit sa 10 porsiyento ng aking kita ay napupunta sa mga gawaing Kristiyano." },
        { id: 11, cat: "D", en: "People often follow my advice.", tl: "Madalas sundin ng mga tao ang aking payo." },
        { id: 12, cat: "C", en: "I normally use several books in lesson preparation.", tl: "Karaniwan akong gumagamit ng ilang mga libro sa paghahanda ng aralin." },
        { id: 13, cat: "B", en: "I like to recruit and lead people.", tl: "Gusto kong mag-recruit at mamuno ng mga tao." },
        { id: 14, cat: "E", en: "One-on-one relationships are important to me.", tl: "Ang one-on-one na relasyon ay mahalaga sa akin." },
        { id: 15, cat: "G", en: "I possess a variety of talents and abilities.", tl: "Nagtataglay ako ng iba't ibang mga talento at kakayahan." },
        { id: 16, cat: "F", en: "I want to measure everything by God's Word.", tl: "Gusto kong sukatin ang lahat sa pamamagitan ng Salita ng Diyos." },
        { id: 17, cat: "A", en: "Material possessions don't mean much to me.", tl: "Ang mga materyal na pag-aari ay hindi gaanong mahalaga sa akin." },
        { id: 18, cat: "D", en: "Discouraged people are encouraged by my words.", tl: "Ang mga taong pinanghihinaan ng loob ay nabibigyang-lakas ng aking mga salita." },
        { id: 19, cat: "C", en: "Being accurate and truthful are important to me.", tl: "Ang pagiging tumpak at tapat ay mahalaga sa akin." },
        { id: 20, cat: "G", en: "I love the challenge of accomplishing an organization goal.", tl: "Gusto ko ang hamon ng pagkamit ng isang layunin ng organisasyon." },
        { id: 21, cat: "D", en: "Other people's spiritual welfare genuinely concerns me.", tl: "Ang espirituwal na kapakanan ng ibang tao ay tunay na mahalaga sa akin." },
        { id: 22, cat: "F", en: "I usually make quick decisions.", tl: "Karaniwan akong gumagawa ng mabilis na desisyon." },
        { id: 23, cat: "E", en: "I look for ways to help the unfortunate and downtrodden.", tl: "Naghahanap ako ng mga paraan upang matulungan ang mga kapus-palad." },
        { id: 24, cat: "C", en: "Criticism doesn't bother me.", tl: "Hindi ako naaabala ng mga kritismo." },
        { id: 25, cat: "G", en: "I often volunteer my time and talents to worthwhile causes.", tl: "Madalas kong ibigay ang aking oras at talento para sa mga makabuluhang layunin." },
        { id: 26, cat: "B", en: "I am usually self-confident.", tl: "Karaniwan akong may tiwala sa sarili." },
        { id: 27, cat: "E", en: "I don't expect repayment for favors I do for others.", tl: "Hindi ako umaasa ng kabayaran para sa mga pabor na ginagawa ko sa iba." },
        { id: 28, cat: "B", en: "I enjoy being responsible for the success of the group.", tl: "Nasisiyahan akong maging responsable para sa tagumpay ng grupo." },
        { id: 29, cat: "F", en: "When a question about truth comes up, I am normally right.", tl: "Kapag may lumabas na tanong tungkol sa katotohanan, karaniwan akong tama." },
        { id: 30, cat: "B", en: "Deadlines challenge me, and I usually meet them on time.", tl: "Hinahamon ako ng mga deadline, at karaniwan ko itong natatapos sa oras." },
        { id: 31, cat: "D", en: "People in pain are comforted by my presence.", tl: "Ang mga taong nasasaktan ay naaaliw sa aking presensya." }
    ];

    const database = {
        A: { 
            en: { title: "GIVING", text: "You contribute material resources, and do God’s work with liberality and cheerfulness. You contribute sacrificially, motivate others, and don’t shun pressure or publicity. Romans 12:13 – “Share with God’s people.”" },
            tl: { title: "PAGBIBIGAY", text: "Nag-aambag ka ng mga materyal na mapagkukunan, at ginagawa ang gawain ng Diyos nang may pagkukusa at kagalakan. Nag-aambag ka nang may pagsasakripisyo, nag-uudyok sa iba, at hindi umiiwas sa pressure o publisidad. Roma 12:13 – “Tumulong kayo sa mga pangangailangan ng mga banal.”" }
        },
        B: { 
            en: { title: "ADMINISTRATION", text: "You lead and communicate in such a way that people work harmoniously to reach goals for God’s purpose. You enjoy being a leader and can endure adverse reactions to get the job done. You enjoy seeing tasks complete; are able to set guidelines, schedules, and policies; and can delegate to get the work done. Romans 12:14 – “Bless those who persecute you.”" },
            tl: { title: "PANGANGASIWA", text: "Namumuno at nakikipag-usap ka upang ang mga tao ay magtrabaho nang maayos para maabot ang mga layunin para sa layunin ng Diyos. Nasisiyahan kang maging pinuno at kayang tiisin ang mga negatibong reaksyon para matapos ang trabaho. Roma 12:14 – “Pagpalain ninyo ang mga umuusig sa inyo.”" }
        },
        C: { 
            en: { title: "TEACHING", text: "You communicate the truth with obvious results. You believe your gift is foundational and work systematically and with accuracy. Romans 12:11 – “Keep spiritual fervor.”" },
            tl: { title: "PAGTUTURO", text: "Ipinapahayag mo ang katotohanan na may malinaw na resulta. Naniniwala ka na ang iyong kaloob ay pundasyon at gumagawa nang sistematiko at may kawastuhan. Roma 12:11 – “Panatilihin ang alab ng espiritu.”" }
        },
        D: { 
            en: { title: "EXHORTATION", text: "You minister by giving comfort and encouragement. You are able to help people through problems and discourage them from giving up. Romans 12:12 – “Joyful, patient and faithful.”" },
            tl: { title: "PANGHIHIKAYAT", text: "Nagbibigay ka ng aliw at lakas ng loob. Nakatutulong ka sa mga tao sa kanilang mga problema at hinihimok silang huwag sumuko. Roma 12:12 – “Magalak kayo sa pag-asa, magtiyaga sa kapighatian.”" }
        },
        E: { 
            en: { title: "MERCY", text: "You feel compassion for those suffering. You are sensitive to the feelings and needs of others. Romans 12:15-16 – “Rejoice with those who rejoice, mourn with mourners.”" },
            tl: { title: "PAGKAWANGGAWA", text: "Nakadarama ka ng habag para sa mga naghihirap. Sensitibo ka sa damdamin at pangangailangan ng iba. Roma 12:15-16 – “Makigalak sa mga nagagalak; makiiyak sa mga umiiyak.”" }
        },
        F: { 
            en: { title: "PROPHECY", text: "You discern and reveal motives and actions. You strongly advocate for God’s truth and character. Romans 12:9 – “Love must be sincere, hate evil.”" },
            tl: { title: "PAGHAHAYAG", text: "Nauunawaan at inihahayag mo ang mga motibo at kilos. Mariin mong itinataguyod ang katotohanan at katangian ng Diyos. Roma 12:9 – “Maging tunay ang inyong pag-ibig; kapootan ang masama.”" }
        },
        G: { 
            en: { title: "SERVING", text: "You identify and meet the needs of others. You are task-oriented and enjoy doing things for people in practical ways. Romans 12:10 – “Be devoted, honor one another.”" },
            tl: { title: "PAGLILINGKOD", text: "Natutukoy at natutugunan mo ang mga pangangailangan ng iba. Nakatuon ka sa mga gawain at nasisiyahan sa pagtulong sa mga tao sa praktikal na paraan. Roma 12:10 – “Magmahalan kayo bilang magkakapatid.”" }
        }
    };

    function renderQuestions() {
        const listEl = document.getElementById('questions-list');
        listEl.innerHTML = '';
        questions.forEach(q => {
            const row = document.createElement('div');
            row.className = 'question-row';
            row.innerHTML = `
                <input type="checkbox" id="q${q.id}" data-cat="${q.cat}" style="margin-right:15px;">
                <label style="flex:1; cursor:pointer;">${q[currentLang]}</label>
            `;
            row.onclick = (e) => {
                const cb = row.querySelector('input');
                if (e.target.tagName !== 'INPUT') cb.checked = !cb.checked;
                row.classList.toggle('selected', cb.checked);
            };
            listEl.appendChild(row);
        });
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'tl' : 'en';
        document.getElementById('lang-toggle').innerText = currentLang === 'en' ? '🇵🇭 Tagalog' : '🇺🇸 English';
        const langData = uiText[currentLang];
        document.getElementById('main-title').innerText = langData.title;
        document.getElementById('sub-title').innerText = langData.sub;
        document.getElementById('title-appendix').innerText = langData.appendix;
        document.getElementById('btn-discover').innerText = currentLang === 'en' ? "Generate My Report" : "Gawin ang aking Report";
        renderQuestions();
    }

    function generateDocument() {
        const idContainer = document.getElementById('identified-gifts-container');
        const appContainer = document.getElementById('appendix-container');
        idContainer.innerHTML = appContainer.innerHTML = '';

        const selectedByCat = {};
        document.querySelectorAll('input:checked').forEach(i => {
            const cat = i.dataset.cat;
            if(!selectedByCat[cat]) selectedByCat[cat] = [];
            selectedByCat[cat].push(questions.find(q => q.id == i.id.substring(1))[currentLang]);
        });

        Object.keys(database).forEach(key => {
            const gift = database[key][currentLang];
            // 1. Identified Strengths Section (Only if selected)
            if (selectedByCat[key]) {
                let html = `<div class="gift-entry">
                    <span class="gift-title">${key}. ${gift.title}</span> ${gift.text}
                    <div style="margin-top:10px;">`;
                selectedByCat[key].forEach(statement => {
                    html += `<span class="selected-statement">• ${statement}</span>`;
                });
                html += `</div></div>`;
                idContainer.innerHTML += html;
            }
            // 2. Appendix Section (Always included)
            appContainer.innerHTML += `<div class="gift-entry"><span class="gift-title">${key}. ${gift.title}</span> ${gift.text}</div>`;
        });

        document.getElementById('form-view').style.display = 'none';
        document.getElementById('report-output').style.display = 'block';
        
        // Final Action: Trigger PDF
        downloadPDF();
    }

    function downloadPDF() {
        const element = document.getElementById('printable-doc');
        const opt = {
            margin: 0.75,
            filename: `Spiritual_Gifts_${currentLang}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    renderQuestions();
</script>
</body>
</html>
